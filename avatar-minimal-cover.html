<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留学宝 | 极简头像截图页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edf3f5;
      --ink: #122026;
      --muted: #5d7078;
      --brand: #0f6f7d;
      --brand-dark: #12313a;
      --accent: #d36b31;
      --line: rgba(18, 32, 38, 0.12);
      --surface: rgba(255, 255, 255, 0.88);
      --shadow: 0 24px 70px rgba(10, 40, 50, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(18, 32, 38, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 32, 38, 0.03) 1px, transparent 1px),
        linear-gradient(180deg, #e6f0f2 0%, #f7fbfc 52%, #e5eef1 100%);
      background-size: 32px 32px, 32px 32px, auto;
    }

    .page {
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .cover-card {
      width: 640px;
      min-height: 860px;
      margin: 0 auto;
      padding: 28px 30px 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(160deg, #14333c 0%, #0f6f7d 100%);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .cover-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.08), transparent 24%);
    }

    .cover-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand-pill,
    .tag-pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .brand-pill {
      color: var(--brand-dark);
      background: rgba(255,255,255,0.94);
    }

    .tag-pill {
      color: #67d3df;
      background: rgba(255,255,255,0.12);
      letter-spacing: 0.08em;
    }

    .avatar-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      margin-top: 72px;
    }

    .avatar-frame {
      display: grid;
      place-items: center;
      width: 360px;
      height: 360px;
      padding: 22px;
      border-radius: 96px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 24px 42px rgba(8, 31, 38, 0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 78px;
      object-fit: cover;
      background: white;
    }

    .content {
      position: relative;
      z-index: 1;
      margin-top: 54px;
      color: white;
    }

    .content h2 {
      margin: 0;
      font-size: 2.8rem;
      line-height: 1.2;
      font-weight: 900;
    }

    .content h2 span {
      display: block;
    }

    .content h2 .accent {
      color: #f0a06d;
      margin-top: 8px;
    }

    .content p {
      margin: 16px 0 0;
      max-width: 24ch;
      color: rgba(255,255,255,0.84);
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
    }

    .footer-note {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 24px;
      z-index: 1;
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-radius: 12px;
      color: white;
      background: rgba(255,255,255,0.12);
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="eyebrow">Avatar Cover</p>
      <h1>留学宝极简头像截图页</h1>
      <p>你直接截图下面这张卡片就行，不用再导出图片。</p>
    </header>

    <section class="cover-card">
      <div class="cover-top">
        <span class="brand-pill">留学宝</span>
        <span class="tag-pill">MINIMAL</span>
      </div>

      <div class="avatar-wrap">
        <div class="avatar-frame">
          <img src="assets/avatar/liuxuebao-avatar-minimal.svg" alt="留学宝极简头像">
        </div>
      </div>

      <div class="content">
        <h2>
          <span>极简头像版</span>
          <span class="accent">适合直接截图</span>
        </h2>
        <p>这个版本更克制，也更像品牌头像。你单独截这一张卡，就能拿去换平台头像或做展示。</p>
      </div>

      <div class="footer-note">如果你喜欢这个方向，我再继续把它收得更高级一点。</div>
    </section>
  </main>
</body>
</html>
